name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER_USERNAME: ch2314
  BACKEND_IMAGE: ch2314/app-back
  FRONTEND_IMAGE: ch2314/app-front

jobs:
  # ──────────────────────────────────────────
  # 1) TESTS
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-html

      - name: Run tests
        run: |
          cd backend
          pytest test_app.py -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --html=test-report.html \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/test-results.xml
            backend/test-report.html
            backend/coverage.xml

  # ──────────────────────────────────────────
  # 2) BUILD & PUSH DOCKER
  # ──────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ──────────────────────────────────────────
  # 3) DEPLOY SUR LA VM (SSH)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM 
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secrets are set
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo " Secret VM_HOST manquant"
            exit 1
          fi
          if [ -z "$VM_USERNAME" ]; then
            echo " Secret VM_USERNAME manquant"
            exit 1
          fi
          echo " Secrets présents"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 15m      
          timeout: 1m             
          script: |
            if [ ! -d "$HOME/app" ]; then
              echo " Clonage du repo..."
              git clone git@github.com:Dark01213/projet-CI_final_CH.git $HOME/app || true
            fi

            cd $HOME/app
            
            echo " Mise à jour du code..."
            git fetch origin
            git reset --hard origin/master

            echo " Pull des images Docker..."
            docker pull ch2314/app-back:latest
            docker pull ch2314/app-front:latest

            echo " Démarrage des conteneurs..."
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            echo " Docker Compose déployé avec succès"
            docker-compose -f docker-compose.prod.yml ps
  # ──────────────────────────────────────────
  # 4) MISE À JOUR KUBERNETES
  # ──────────────────────────────────────────
  kubernetes:
    name: Update Kubernetes
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Update Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 15m        # ← timeout par commande
          timeout: 1m               # ← timeout de connexion SSH
          script: |
            #!/bin/bash
            echo "Fixing k3s permissions and updating deployments..."
            sudo systemctl stop k3s || true
            sudo k3s server --write-kubeconfig-mode 644 &
            sleep 15
            sudo k3s kubectl cluster-info || { echo "k3s cluster not accessible"; exit 1; }

            echo "Applying Kubernetes manifests..."

            # Apply ConfigMap
            cat <<EOF | sudo k3s kubectl apply -f -
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: app-config
              namespace: default
              labels:
                app: task-app
            data:
              environment: "production"
              debug: "False"
              api_url: "http://backend-service:5000"
            ---
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: nginx-config
              namespace: default
              labels:
                app: task-app
                component: frontend
            data:
              default.conf: |
                server {
                    listen 80;
                    server_name localhost;

                    root /usr/share/nginx/html;
                    index index.html index.htm;

                    location / {
                        try_files \$uri \$uri/ /index.html;
                    }

                    location /api {
                        proxy_pass http://backend-service:5000;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade \$http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host \$host;
                        proxy_cache_bypass \$http_upgrade;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto \$scheme;
                    }

                    location /health {
                        proxy_pass http://backend-service:5000;
                        proxy_http_version 1.1;
                    }

                    error_page 404 /index.html;
                }
            EOF

            # Apply Backend Deployment and Service
            cat <<EOF | sudo k3s kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: backend-deployment
              namespace: default
              labels:
                app: task-app
                component: backend
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: task-app
                  component: backend
              template:
                metadata:
                  labels:
                    app: task-app
                    component: backend
                spec:
                  containers:
                  - name: backend
                    image: localhost:5000/task-backend:latest
                    imagePullPolicy: IfNotPresent
                    ports:
                    - containerPort: 5000
                      name: http
                    env:
                    - name: FLASK_APP
                      value: app.py
                    - name: ENVIRONMENT
                      valueFrom:
                        configMapKeyRef:
                          name: app-config
                          key: environment
                    - name: DEBUG
                      valueFrom:
                        configMapKeyRef:
                          name: app-config
                          key: debug
                    resources:
                      requests:
                        memory: "128Mi"
                        cpu: "100m"
                      limits:
                        memory: "256Mi"
                        cpu: "500m"
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: 5000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 5000
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: backend-service
              namespace: default
              labels:
                app: task-app
                component: backend
            spec:
              type: ClusterIP
              ports:
              - port: 5000
                targetPort: 5000
                protocol: TCP
                name: http
              selector:
                app: task-app
                component: backend
            EOF

            # Apply Frontend Deployment and Service
            cat <<EOF | sudo k3s kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: frontend-deployment
              namespace: default
              labels:
                app: task-app
                component: frontend
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: task-app
                  component: frontend
              template:
                metadata:
                  labels:
                    app: task-app
                    component: frontend
                spec:
                  containers:
                  - name: frontend
                    image: localhost:5000/task-frontend:latest
                    imagePullPolicy: IfNotPresent
                    ports:
                    - containerPort: 80
                      name: http
                    env:
                    - name: REACT_APP_API_URL
                      valueFrom:
                        configMapKeyRef:
                          name: app-config
                          key: api_url
                    resources:
                      requests:
                        memory: "64Mi"
                        cpu: "50m"
                      limits:
                        memory: "128Mi"
                        cpu: "250m"
                    livenessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 80
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 3
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: frontend-service
              namespace: default
              labels:
                app: task-app
                component: frontend
            spec:
              type: NodePort
              ports:
              - port: 80
                targetPort: 80
                nodePort: 30080
                protocol: TCP
                name: http
              selector:
                app: task-app
                component: frontend
            EOF

            sudo k3s kubectl set image deployment/backend-deployment backend=ch2314/app-back:latest
            sudo k3s kubectl set image deployment/frontend-deployment frontend=ch2314/app-front:latest
            sudo k3s kubectl rollout status deployment/backend-deployment --timeout=3m
            sudo k3s kubectl rollout status deployment/frontend-deployment --timeout=3m
            echo "Kubernetes updated successfully"