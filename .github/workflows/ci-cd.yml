name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER_USERNAME: ch2314
  BACKEND_IMAGE: ch2314/app-back
  FRONTEND_IMAGE: ch2314/app-front

jobs:
  # ──────────────────────────────────────────
  # 1) TESTS
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-html

      - name: Run tests
        run: |
          cd backend
          pytest test_app.py -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --html=test-report.html \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/test-results.xml
            backend/test-report.html
            backend/coverage.xml

  # ──────────────────────────────────────────
  # 2) BUILD & PUSH DOCKER
  # ──────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ──────────────────────────────────────────
  # 3) DEPLOY SUR LA VM (SSH)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM 
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secrets are set
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo " Secret VM_HOST manquant"
            exit 1
          fi
          if [ -z "$VM_USERNAME" ]; then
            echo " Secret VM_USERNAME manquant"
            exit 1
          fi
          echo " Secrets présents"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 15m      
          timeout: 1m             
          script: |
            if [ ! -d "$HOME/app" ]; then
              echo " Clonage du repo..."
              git clone git@github.com:Dark01213/projet-CI_final_CH.git $HOME/app || true
            fi

            cd $HOME/app
            
            echo " Mise à jour du code..."
            git fetch origin
            git reset --hard origin/master

            echo " Pull des images Docker..."
            docker pull ch2314/app-back:latest
            docker pull ch2314/app-front:latest

            echo " Démarrage des conteneurs..."
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            echo " Docker Compose déployé avec succès"
            docker-compose -f docker-compose.prod.yml ps
  # ──────────────────────────────────────────
  # 4) MISE À JOUR KUBERNETES
  # ──────────────────────────────────────────
  kubernetes:
    name: Update Kubernetes
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Update Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 15m        # ← timeout par commande
          timeout: 1m               # ← timeout de connexion SSH
          script: |

              # Ensure kubeconfig is accessible for this user: copy k3s kubeconfig and adjust permissions
              mkdir -p ~/.kube
              if [ -r /etc/rancher/k3s/k3s.yaml ]; then
                sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config || sudo sh -c 'cat /etc/rancher/k3s/k3s.yaml > ~/.kube/config'
                sudo chown $(id -u):$(id -g) ~/.kube/config
                sudo chmod 644 ~/.kube/config
                export KUBECONFIG=~/.kube/config
              else
                echo "k3s kubeconfig not readable, will try default KUBECONFIG"
              fi

              kubectl version --client || true
              kubectl cluster-info || { echo " kubectl non configuré"; exit 1; }

              kubectl set image deployment/backend-deployment \
              backend=ch2314/app-back:latest
              kubectl set image deployment/frontend-deployment \
              frontend=ch2314/app-front:latest

              kubectl rollout status deployment/backend-deployment --timeout=3m || \
              { echo " Backend rollout failed"; kubectl describe deployment/backend-deployment; exit 1; }

              kubectl rollout status deployment/frontend-deployment --timeout=3m || \
              { echo " Frontend rollout failed"; kubectl describe deployment/frontend-deployment; exit 1; }

              echo " Kubernetes mis à jour"