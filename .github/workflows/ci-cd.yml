name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER_USERNAME: ch2314
  BACKEND_IMAGE: ch2314/app-back
  FRONTEND_IMAGE: ch2314/app-front

jobs:
  # ──────────────────────────────────────────
  # 1) TESTS
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-html

      - name: Run tests
        run: |
          cd backend
          pytest test_app.py -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --html=test-report.html \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/test-results.xml
            backend/test-report.html
            backend/coverage.xml

  # ──────────────────────────────────────────
  # 2) BUILD & PUSH DOCKER
  # ──────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ──────────────────────────────────────────
  # 3) DEPLOY SUR LA VM (SSH)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build
    # ✅ Condition correcte : secrets JAMAIS dans if:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secrets are set
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USERNAME: ${{ secrets.VM_USERNAME }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "❌ Secret VM_HOST manquant"
            exit 1
          fi
          if [ -z "$VM_USERNAME" ]; then
            echo "❌ Secret VM_USERNAME manquant"
            exit 1
          fi
          echo "✅ Secrets présents"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/app || git clone https://github.com/${{ github.repository }}.git ~/app && cd ~/app
            git pull origin master
            docker pull ch2314/app-back:latest
            docker pull ch2314/app-front:latest
            docker-compose -f docker-compose_prod.yml down
            docker-compose -f docker-compose_prod.yml up -d
            echo "✅ Docker Compose déployé"

  # ──────────────────────────────────────────
  # 4) MISE À JOUR KUBERNETES
  # ──────────────────────────────────────────
  kubernetes:
    name: Update Kubernetes
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            kubectl set image deployment/backend-deployment \
              backend=ch2314/app-back:latest
            kubectl set image deployment/frontend-deployment \
              frontend=ch2314/app-front:latest
            kubectl rollout status deployment/backend-deployment
            kubectl rollout status deployment/frontend-deployment
            echo "✅ Kubernetes mis à jour"