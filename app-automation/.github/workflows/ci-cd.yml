name: CI/CD Pipeline
# Security: This workflow uses encrypted secrets from GitHub Actions
# All sensitive data is masked in logs automatically

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_ID: app-automation-prod
  LOG_RETENTION_DAYS: 30

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      
      - name: Run backend tests
        run: |
          cd backend
          pytest test_app.py -v --cov=. --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM (Production)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://${{ secrets.VM_HOST }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate secrets
        id: validate_secrets
        run: |
          if [[ -z "${{ secrets.VM_HOST }}" ]]; then
            echo "ERROR: VM_HOST secret is not configured"
            exit 1
          fi
          if [[ -z "${{ secrets.VM_USERNAME }}" ]]; then
            echo "ERROR: VM_USERNAME secret is not configured"
            exit 1
          fi
          if [[ -z "${{ secrets.VM_SSH_KEY }}" ]]; then
            echo "ERROR: VM_SSH_KEY secret is not configured"
            exit 1
          fi
          echo "✓ All required secrets are configured"
          echo "deployment_id=${{ env.APP_ID }}-$(date +%s)" >> $GITHUB_OUTPUT
      
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            echo "🚀 Deployment started at $(date)"
            echo "📍 Application ID: ${{ env.APP_ID }}"
            cd /opt/app-automation || exit 1
            git pull origin main || exit 1
            docker-compose pull || exit 1
            docker-compose up -d || exit 1
            echo "✓ Docker Compose deployment completed"
            echo "🚀 Deployment finished at $(date)"
      
      - name: Update Kubernetes deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script: |
            echo "☸️  Updating Kubernetes deployment..."
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            
            kubectl set image deployment/backend-deployment \
              backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:main \
              --record --namespace=default || true
            
            kubectl set image deployment/frontend-deployment \
              frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:main \
              --record --namespace=default || true
            
            echo "⏳ Waiting for rollout..."
            kubectl rollout status deployment/backend-deployment --timeout=5m || true
            kubectl rollout status deployment/frontend-deployment --timeout=5m || true
            
            echo "✓ Kubernetes deployment updated"

  health-check:
    name: Health Check (Post-Deployment)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check application health
        timeout-minutes: 5
        run: |
          echo "🏥 Starting health checks for app-automation..."
          HEALTH_URL="http://${{ secrets.VM_HOST }}:5000/health"
          MAX_ATTEMPTS=30
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."
            if curl -f -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" | grep -q "200"; then
              echo "✓ Health check PASSED!"
              echo "✓ Application is healthy and running"
              exit 0
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ Application not ready yet, waiting 10 seconds..."
            sleep 10
          done
          
          echo "❌ Health check FAILED after $MAX_ATTEMPTS attempts"
          echo "🔍 Diagnostic information:"
          curl -v "$HEALTH_URL" || true
          exit 1
      
      - name: Deployment Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 DEPLOYMENT SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Application ID: ${{ env.APP_ID }}"
          echo "Environment: production"
          echo "Deployed to: ${{ secrets.VM_HOST }}"
          echo "Timestamp: $(date -u)"
          echo "Status: ${{ job.status }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          done
          echo "Health check failed!"
          exit 1
